name: Mirror to Public Security Repo

on:
  push:
    branches:
      - main   # only mirror main branch
  workflow_dispatch:   # allows manual trigger

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Remove sensitive files before mirroring
        run: |
          # List of files/folders to exclude from mirror
          EXCLUDES=(
            ".env"
            "config.json"
            "docker-compose.override.yml"
            "secrets/*"
            "*.pem"
            "*.key"
          )

          for file in "${EXCLUDES[@]}"; do
            git rm --cached -f $file || true
          done

          git commit -m "Strip sensitive files for mirror" || true

      - name: Push to public mirror
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/BunmiDev/SaaS_Project_SecurityMirror.git
          git push mirror main --force
