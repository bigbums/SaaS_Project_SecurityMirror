name: Mirror to Public Security Repo

on:
  push:
    branches:
      - main   # only mirror main branch

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Push to public mirror
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/yourusername/SaaS_Project_SecurityMirror.git
          git push mirror main --force
