name: Mirror to Public Security Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false   # skip broken submodule

      - name: Remove sensitive files before mirroring
        run: |
          EXCLUDES=(
            ".env"
            "config.json"
            "docker-compose.override.yml"
            "secrets/*"
            "*.pem"
            "*.key"
          )
          for file in "${EXCLUDES[@]}"; do
            git rm --cached -f $file || true
          done
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git commit -m "Strip sensitive files for mirror" || true

      - name: Debug secret length
        env:
          TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ MIRROR_TOKEN is NOT set"
          else
            echo "✅ MIRROR_TOKEN length: ${#TOKEN}"
          fi

      - name: Push to public mirror
        env:
          TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/bigbums/SaaS_Project_SecurityMirror.git
          git push origin main --force
