name: Debug Secret

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret
        env:
          TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ MIRROR_TOKEN is NOT set"
          else
            echo "✅ MIRROR_TOKEN length: ${#TOKEN}"
          fi
