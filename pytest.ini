[pytest]
DJANGO_SETTINGS_MODULE = saas_app.settings
markers =
    rbac: marks tests as RBAC-related (platform + tenant)
python_files = test_*.py
testpaths =
     saas_app/core/tests/tenant
     saas_app/core/tests/platform
     saas_app/core/tests
markers =
    tenant: mark tests that require tenant context
    platform: mark tests that require platform context
